<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPGA RAID Lab</title>
  <meta name="description" content="面向星载 NVMe SSD 阵列固存工程样机的 FPGA RAID 前期调研与费曼学习教程" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root { --theme-color: #2563eb; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; }
    .markdown-section { max-width: 980px; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 { font-weight: 700; }
    .markdown-section blockquote { border-left: 4px solid #2563eb; background: #f8fafc; color: #334155; }
    .markdown-section table { display: table; width: 100%; }
    .sidebar-nav li.active > a { color: #2563eb; font-weight: 700; }
    .app-name-link { font-weight: 800; }
  </style>
</head>
<body>
  <div id="app">正在加载 FPGA RAID Lab 教程...</div>
  <script>
    window.$docsify = {
      name: 'FPGA RAID Lab',
      repo: 'MYJ695/fpga-raid-lab',
      homepage: 'docs/index.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md',
        '/.*/_coverpage.md': '/_coverpage.md',
        '/requirements_alignment.md': '/docs/requirements_alignment.md',
        '/acceptance_checklist.md': '/docs/acceptance_checklist.md',
        '/feynman_learning_path.md': '/docs/feynman_learning_path.md',
        '/study_plan.md': '/docs/study_plan.md',
        '/00_big_picture.md': '/docs/00_big_picture.md',
        '/working_modes.md': '/docs/working_modes.md',
        '/axis_axi_lite_basics.md': '/docs/axis_axi_lite_basics.md',
        '/control_plane_registers.md': '/docs/control_plane_registers.md',
        '/nvme_host_options.md': '/docs/nvme_host_options.md',
        '/raid_basics.md': '/docs/raid_basics.md',
        '/raid0_mapping.md': '/docs/raid0_mapping.md',
        '/raid1_mirror.md': '/docs/raid1_mirror.md',
        '/raid5_parity.md': '/docs/raid5_parity.md',
        '/raid5_write_path.md': '/docs/raid5_write_path.md',
        '/write_hole.md': '/docs/write_hole.md',
        '/rebuild_and_scrub.md': '/docs/rebuild_and_scrub.md',
        '/index.md': '/docs/index.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索教程内容',
        noData: '没有找到结果',
        depth: 4
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-verilog.min.js"></script>
